spring.application.name=staynest

# ─── MySQL ───────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/staynest_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Port ────────────────────────────────────────────────────────────────────
server.port=8080

# ─── Disable Spring Security login page (enable proper security in Sprint 2) ─
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
